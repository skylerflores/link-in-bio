<!DOCTYPE html>
<html>
    <head> 
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>This is my homepage</title>

        <style>
            html{
                min-height: 100%;
            }

            * {
                border: .5px #03f0fc solid;
            }

            body {
                color: rgba(255, 255, 255, 1.0);
                padding-top: 40px;
                padding-bottom: 40px;
                background: linear-gradient(#5203fc, #2003fc, #0339fc, #03a5fc, #03f0fc)
            }
            a {
                color: white;
            }

            .avatar-image{
                width: 200px;
                height: 200px;
                object-fit: cover;
                border-radius: 200px;
            }

            .main-container {
                max-width: 640px;
                margin: auto;
            }

            .image-row {
                margin-bottom: 20px;
                text-align: center;
            }

            .name-row {
                margin-bottom: 30px;
                text-align: center;
                font-size: 30px;
            }

            .social-icon-column {
                margin-bottom: 30px;
                display: flex;
                flex-direction: column;
                justify-content: space-around;
                align-items: center;
                font-size: 22px;
            }
        </style>
    </head>
    <body>
        <div class="main-container">

            <div class="image-row">
                <img class="avatar-image" src="Me.jpeg" alt="SKyler's headshot">
            </div>

            <div class="name-row">
                Skyler Flores
            </div>

            <div class="social-icon-column">
                
                <a href="https://github.com/skylerflores" target="_blank">
                    GitHub
                </a>

                <a href="https://www.linkedin.com/in/skyler-flores-377aa0230/" target="_blank">
                    LinkedIn
                </a>

                <a href="https://www.instagram.com/thatboiiskyler/" target="_blank">
                    Instagram
                </a>

                <a href="https://x.com/thatboiiskyler" target="_blank">
                    X
                </a>
            </div>
        </div>
    </body>
</html>
